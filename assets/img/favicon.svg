<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Recovery Roofer favicon">
  <title>Recovery Roofer</title>

  <!-- Dark background -->
  <rect width="64" height="64" fill="#111111" rx="8"/>

  <!-- Roof body -->
  <polygon points="32,10 6,42 58,42" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Left slope -->
  <polygon points="32,10 6,42 12,42 32,18" fill="#282828"/>
  <!-- Right slope -->
  <polygon points="32,10 58,42 52,42 32,18" fill="#242424"/>

  <!-- Shingle lines left -->
  <line x1="10" y1="42" x2="28" y2="22" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="16" y1="42" x2="30" y2="27" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="22" y1="42" x2="31" y2="33" stroke="#1a1a1a" stroke-width="0.8"/>

  <!-- Shingle lines right -->
  <line x1="54" y1="42" x2="36" y2="22" stroke="#1e1e1e" stroke-width="0.8"/>
  <line x1="48" y1="42" x2="34" y2="27" stroke="#1e1e1e" stroke-width="0.8"/>
  <line x1="42" y1="42" x2="33" y2="33" stroke="#1e1e1e" stroke-width="0.8"/>

  <!-- Ridge line -->
  <line x1="6" y1="42" x2="58" y2="42" stroke="#333" stroke-width="1"/>

  <!-- Blue peak -->
  <polygon points="32,2 25,16 39,16" fill="#00a2ff"/>

  <!-- "RR" initials below -->
  <text
    x="32" y="58"
    text-anchor="middle"
    font-family="'Arial Black','Franklin Gothic Heavy',sans-serif"
    font-weight="900"
    font-size="11"
    letter-spacing="2"
    fill="#888888">ROOFER</text>

</svg>
