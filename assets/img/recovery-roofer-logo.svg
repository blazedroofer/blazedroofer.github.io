<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <!-- Spike -->
  <polygon points="160,12 169,44 151,44" fill="#00a2ff"/>
  <!-- Roof -->
  <polygon points="160,44 244,102 76,102" fill="#333333"/>
  <!-- Roof soffit / fill to close gap -->
  <rect x="76" y="98" width="168" height="8" fill="#333333"/>
  <!-- Left leg -->
  <rect x="92" y="102" width="22" height="42" fill="#333333"/>
  <!-- Right leg -->
  <rect x="206" y="102" width="22" height="42" fill="#333333"/>
  <!-- Base bar -->
  <rect x="80" y="140" width="160" height="8" fill="#333333"/>
  <!-- Roof edge highlight -->
  <polyline points="78,101 160,45 242,101" fill="none" stroke="#555555" stroke-width="1.5"/>
  <!-- RECOVERY -->
  <text x="160" y="163"
    text-anchor="middle"
    font-family="'Segoe UI', Arial, sans-serif"
    font-weight="800"
    font-size="24"
    letter-spacing="3"
    fill="#00a2ff">RECOVERY</text>
  <!-- ROOFER -->
  <text x="160" y="177"
    text-anchor="middle"
    font-family="'Segoe UI', Arial, sans-serif"
    font-weight="900"
    font-size="13"
    letter-spacing="6"
    fill="#e0e0e0">ROOFER</text>
</svg>
