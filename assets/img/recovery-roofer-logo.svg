<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80" role="img" aria-label="Recovery Roofer">
  <title>Recovery Roofer</title>

  <!-- Roof gable silhouette -->
  <polygon points="46,52 10,52 28,28" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <!-- Left slope shading -->
  <polygon points="28,28 10,52 15,52 28,34" fill="#282828"/>
  <!-- Right slope shading -->
  <polygon points="28,28 46,52 41,52 28,34" fill="#242424"/>

  <!-- Shingle texture lines left -->
  <line x1="13" y1="52" x2="25" y2="37" stroke="#1a1a1a" stroke-width="0.7"/>
  <line x1="17" y1="52" x2="27" y2="40" stroke="#1a1a1a" stroke-width="0.7"/>
  <line x1="21" y1="52" x2="27.5" y2="44" stroke="#1a1a1a" stroke-width="0.7"/>

  <!-- Shingle texture lines right -->
  <line x1="43" y1="52" x2="31" y2="37" stroke="#1e1e1e" stroke-width="0.7"/>
  <line x1="39" y1="52" x2="29" y2="40" stroke="#1e1e1e" stroke-width="0.7"/>
  <line x1="35" y1="52" x2="28.5" y2="44" stroke="#1e1e1e" stroke-width="0.7"/>

  <!-- Ridge base line -->
  <line x1="10" y1="52" x2="46" y2="52" stroke="#333" stroke-width="1"/>

  <!-- Blue peak triangle -->
  <polygon points="28,17 22,30 34,30" fill="#00a2ff"/>

  <!-- Faint blue slope edge hints -->
  <line x1="28" y1="28" x2="13" y2="46" stroke="#00a2ff" stroke-width="0.6" opacity="0.18"/>
  <line x1="28" y1="28" x2="43" y2="46" stroke="#00a2ff" stroke-width="0.6" opacity="0.18"/>

  <!-- RECOVERY text -->
  <text
    x="60" y="40"
    font-family="'Arial Black','Franklin Gothic Heavy','Impact',sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="1.5"
    fill="#00a2ff">RECOVERY</text>

  <!-- Thin divider between words -->
  <line x1="60" y1="45" x2="330" y2="45" stroke="#1e1e1e" stroke-width="0.75"/>

  <!-- ROOFER text -->
  <text
    x="60" y="60"
    font-family="'Arial','Helvetica Neue',sans-serif"
    font-weight="700"
    font-size="13"
    letter-spacing="6"
    fill="#555555">ROOFER</text>

</svg>
